<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Extractor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 720px; margin: 0 auto; }

    header { margin-bottom: 2rem; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header p { color: #666; font-size: 0.8rem; margin-top: 0.2rem; }

    .upload-zone {
      background: #111;
      border: 1px dashed #333;
      padding: 1.75rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s;
      margin-bottom: 1rem;
      position: relative;
    }

    .upload-zone:hover, .upload-zone.drag-over { border-color: #fff; }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .upload-zone h2 { font-size: 0.95rem; font-weight: 500; }
    .upload-zone p { color: #555; font-size: 0.8rem; margin-top: 0.2rem; }

    .controls {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .slider-control {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .slider-control label { color: #666; font-size: 0.82rem; }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 2px;
      background: #333;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      cursor: pointer;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    .n-value { font-size: 0.82rem; color: #fff; min-width: 1rem; }

    .btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 0.5rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-left: auto;
    }

    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Results */
    #result-section { display: none; margin-bottom: 3rem; }

    .result-image-wrap { margin-bottom: 2px; }
    .result-image-wrap img {
      width: 100%;
      max-height: 400px;
      object-fit: cover;
      display: block;
    }

    .color-rows { margin-bottom: 2rem; }

    .palette-row {
      display: flex;
      height: 72px;
      margin-bottom: 2px;
      overflow: hidden;
    }

    .palette-cell {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.1s;
      overflow: hidden;
      min-width: 0;
      position: relative;
    }

    .palette-cell:hover { opacity: 0.88; }

    .palette-hex {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.5rem;
      max-width: 100%;
    }

    .palette-copy {
      position: absolute;
      bottom: 0.35rem;
      font-size: 0.62rem;
      opacity: 0;
      transition: opacity 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .palette-cell:hover .palette-copy { opacity: 0.6; }

    /* Section label */
    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
    }

    /* Seed grid */
    .seed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 2px;
      margin-bottom: 2rem;
    }

    .seed-card {
      background: #111;
      border: 1px solid #222;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .seed-card:hover { border-color: #fff; }

    .seed-card img {
      width: 100%;
      height: 78px;
      object-fit: cover;
      display: block;
    }

    .seed-card .seed-name {
      padding: 0.3rem 0.4rem;
      font-size: 0.68rem;
      color: #555;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Toast */
    .copied-toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      color: #000;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .copied-toast.show { opacity: 1; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.3rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-box {
      border: 1px solid #500;
      padding: 0.6rem 0.9rem;
      color: #f87171;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 480px) {
      .btn { margin-left: 0; }
      .controls { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Color Extractor</h1>
      <p>Extract dominant colors using Oklab</p>
    </header>

    <div id="error-box" class="error-box" style="display:none"></div>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <h2 id="upload-title">Drop an image or click to browse</h2>
      <p id="upload-sub">JPEG, PNG, WebP, GIF, BMP, TIFF</p>
    </div>

    <div class="controls">
      <div class="slider-control">
        <label for="n-input">Colors</label>
        <input type="range" id="n-input" min="1" max="8" value="5" />
        <span class="n-value" id="n-display">5</span>
      </div>
      <button class="btn" id="analyze-btn" disabled>Analyze</button>
    </div>

    <div id="result-section">
      <div class="result-image-wrap">
        <img id="result-img" src="" alt="Selected image" />
      </div>
      <div class="color-rows" id="color-rows"></div>
    </div>

    <p class="section-label">Sample images</p>
    <div class="seed-grid" id="seed-grid"></div>
  </div>

  <div class="copied-toast" id="toast">Copied</div>

  <script>
    const SEED_IMAGES = [
      { name: 'Autumn Landscape', path: '/test_images/autumn_landscape.jpg' },
      { name: 'The Scream', path: '/test_images/the_scream.jpg' },
      { name: 'Supremus 55', path: '/test_images/supremus_55.jpg' },
      { name: 'Red Moon', path: '/test_images/red_moon.jpg' },
      { name: 'Milkmaid', path: '/test_images/het_melkmeisje_small.jpg' },
      { name: 'Kodak 01', path: '/test_images/kodim01.png' },
      { name: 'Kodak 23', path: '/test_images/kodim23.png' },
      { name: 'Palette', path: '/test_images/palette.png' },
      { name: 'Ocean', path: '/test_images/ocean.png' },
      { name: 'Sunset', path: '/test_images/sunset.png' },
      { name: 'Forest', path: '/test_images/forest.png' },
      { name: 'Flowers', path: '/test_images/flowers.png' },
    ];

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const analyzeBtn = document.getElementById('analyze-btn');
    const nInput = document.getElementById('n-input');
    const nDisplay = document.getElementById('n-display');
    const resultSection = document.getElementById('result-section');
    const resultImg = document.getElementById('result-img');
    const colorRows = document.getElementById('color-rows');
    const errorBox = document.getElementById('error-box');
    const toast = document.getElementById('toast');
    const uploadTitle = document.getElementById('upload-title');
    const uploadSub = document.getElementById('upload-sub');

    let selectedFile = null;
    let selectedUrl = null;

    // Slider
    nInput.addEventListener('input', () => nDisplay.textContent = nInput.value);

    // Seed grid
    const seedGrid = document.getElementById('seed-grid');
    SEED_IMAGES.forEach(({ name, path }) => {
      const card = document.createElement('div');
      card.className = 'seed-card';
      const img = document.createElement('img');
      img.src = path;
      img.alt = name;
      img.onerror = () => { card.style.display = 'none'; };
      const label = document.createElement('div');
      label.className = 'seed-name';
      label.textContent = name;
      card.appendChild(img);
      card.appendChild(label);
      card.addEventListener('click', () => {
        selectedFile = null;
        selectedUrl = path;
        analyzeBtn.disabled = false;
        errorBox.style.display = 'none';
        uploadTitle.textContent = name;
        uploadSub.textContent = 'Click Analyze to extract colors';
        document.querySelectorAll('.seed-card').forEach(c => c.style.outline = '');
        card.style.outline = '1px solid #fff';
      });
      seedGrid.appendChild(card);
    });

    // File input
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    function setFile(file) {
      selectedFile = file;
      selectedUrl = null;
      analyzeBtn.disabled = false;
      errorBox.style.display = 'none';
      uploadTitle.textContent = file.name;
      uploadSub.textContent = `${(file.size / 1024).toFixed(1)} KB`;
      document.querySelectorAll('.seed-card').forEach(c => c.style.outline = '');
    }

    // Drag and drop
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) setFile(file);
    });

    // Paste
    document.addEventListener('paste', e => {
      const item = [...e.clipboardData.items].find(i => i.type.startsWith('image/'));
      if (item) setFile(item.getAsFile());
    });

    // Analyze
    analyzeBtn.addEventListener('click', analyze);

    async function analyze() {
      const n = parseInt(nInput.value) || 5;
      analyzeBtn.disabled = true;
      analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing';
      errorBox.style.display = 'none';

      try {
        let blob;
        if (selectedFile) {
          blob = selectedFile;
          resultImg.src = URL.createObjectURL(selectedFile);
        } else if (selectedUrl) {
          const res = await fetch(selectedUrl);
          blob = await res.blob();
          resultImg.src = selectedUrl;
        } else {
          throw new Error('No image selected');
        }

        const form = new FormData();
        form.append('image', blob, 'image.jpg');

        const resp = await fetch(`/colors?n=${n}`, { method: 'POST', body: form });
        const data = await resp.json();

        if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

        renderResults(data);
      } catch (err) {
        errorBox.textContent = `Error: ${err.message}`;
        errorBox.style.display = 'block';
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = 'Analyze';
      }
    }

    function luminance(hex) {
      const r = parseInt(hex.slice(1,3),16)/255;
      const g = parseInt(hex.slice(3,5),16)/255;
      const b = parseInt(hex.slice(5,7),16)/255;
      return 0.2126*r + 0.7152*g + 0.0722*b;
    }

    function renderResults(data) {
      const colors = data.colors || [];
      if (!colors.length) return;

      // Each row i shows a palette of colors[0..i] side by side
      colorRows.innerHTML = colors.map((_, rowIdx) => {
        const palette = colors.slice(0, rowIdx + 1);
        const cells = palette.map(hex => {
          const lum = luminance(hex);
          const fg = lum > 0.35 ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.9)';
          return `<div class="palette-cell" style="background:${hex};color:${fg}" onclick="copyHex('${hex}')">
            <span class="palette-hex">${hex}</span>
            <span class="palette-copy">copy</span>
          </div>`;
        }).join('');
        return `<div class="palette-row">${cells}</div>`;
      }).join('');

      resultSection.style.display = 'block';
      resultSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function copyHex(hex) {
      navigator.clipboard.writeText(hex).then(() => {
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1200);
      });
    }
  </script>
</body>
</html>
