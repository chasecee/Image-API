<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Extractor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Color Extractor</h1>
      <p>Extract dominant colors using Oklab</p>
    </header>

    <div id="error-box" class="error-box" style="display:none"></div>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" />
      <h2 id="upload-title">Drop an image or click to browse</h2>
      <p id="upload-sub">JPEG, PNG, WebP, GIF, BMP, TIFF</p>
    </div>

    <div class="controls">
      <div class="slider-control">
        <label for="n-input">Colors</label>
        <input type="range" id="n-input" min="1" max="8" value="5" />
        <span class="n-value" id="n-display">5</span>
      </div>
      <div class="slider-control">
        <label for="dist-input">Oklab Δ</label>
        <input type="range" id="dist-input" min="0" max="0.15" step="0.01" value="0.01" />
        <span class="n-value" id="dist-display">0.01</span>
      </div>
      <div class="slider-control">
        <label for="chroma-input">Saturation bias</label>
        <input type="range" id="chroma-input" min="0" max="1" step="0.05" value="0.70" />
        <span class="n-value" id="chroma-display">0.70</span>
      </div>
      <div class="slider-control">
        <label for="mask-input">Center bias</label>
        <input type="range" id="mask-input" min="0" max="1" step="0.1" value="1.0" />
        <span class="n-value" id="mask-display">1.0</span>
      </div>
      <button class="btn" id="analyze-btn" disabled>Analyze</button>
    </div>

    <div id="result-section">
      <div class="color-group-bar">
        <label class="toggle-switch" for="color-group-toggle">
          <input type="checkbox" id="color-group-toggle" />
          <span class="toggle-slider"></span>
        </label>
        <label class="toggle-label" for="color-group-toggle">Color groups</label>
      </div>
      <div class="result-image-wrap">
        <img id="result-img" src="" alt="Selected image" />
        <canvas id="color-group-canvas"></canvas>
      </div>
      <div class="image-info" id="image-info"></div>
      <div class="color-rows" id="color-rows"></div>
    </div>

    <p class="section-label">Sample images</p>
    <div class="seed-grid" id="seed-grid"></div>
  </div>

  <div class="copied-toast" id="toast">Copied</div>

  <script src="app.js"></script>
</body>
</html>
